name: Sync upstream and update Indonesian README

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync-and-translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        env:
          UPSTREAM_REPOSITORY: ruanyf/weekly
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch upstream master
          git checkout master
          git merge --no-edit upstream/master

      - name: Regenerate Indonesian README
        run: python3 scripts/generate_readme_id.py README.md README.id.md

      - name: Commit and push if changed
        run: |
          if ! git diff --quiet; then
            git add README.id.md
            git commit -m "chore: sync upstream and refresh Indonesian README"
          fi

          if [ "$(git rev-list --count origin/master..HEAD)" -eq 0 ]; then
            echo "No changes to push."
            exit 0
          fi

          git push origin master
